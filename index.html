// Helper functions
function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

// Check if code was previously saved
const savedCode = localStorage.getItem('wg_code');
if (savedCode) {
  document.getElementById('codeInput').value = savedCode;
  setTimeout(() => tryUnlock(), 300);
}

// Enter key support
document.getElementById('codeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') tryUnlock();
});

async function tryUnlock() {
  const input = document.getElementById('codeInput');
  const btn = document.getElementById('enterBtn');
  const status = document.getElementById('status');
  const code = input.value.trim().toUpperCase();
  
  if (!code) { status.textContent = '请输入邀请码'; return; }
  
  btn.disabled = true;
  btn.textContent = '验证中...';
  status.textContent = '';
  input.classList.remove('err');
  
  try {
    const masterKey = await tryDecryptMasterKey(code);
    if (!masterKey) {
      input.classList.add('err');
      status.textContent = '邀请码无效，请检查后重试';
      btn.disabled = false;
      btn.textContent = '进入手册';
      return;
    }
    
    // Decrypt content
    btn.textContent = '解密中...';
    const contentData = b64ToBytes(ENC_CONTENT);
    const contentNonce = contentData.slice(0, 12);
    const contentCipher = contentData.slice(12);
    
    const contentKey = await crypto.subtle.importKey("raw", masterKey, { name: "AES-GCM" }, false, ["decrypt"]);
    const decrypted = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: contentNonce },
      contentKey,
      contentCipher
    );
    
    const html = new TextDecoder().decode(decrypted);
    
    // Save code for convenience
    localStorage.setItem('wg_code', code);
    
    // Show app
    document.getElementById('gate').style.display = 'none';
    const iframe = document.getElementById('app');
    iframe.style.display = 'block';
    iframe.srcdoc = html;
    
  } catch (e) {
    console.error(e);
    input.classList.add('err');
    status.textContent = '解密失败，请重试';
    btn.disabled = false;
    btn.textContent = '进入手册';
  }
}

async function tryDecryptMasterKey(code) {
  const enc = new TextEncoder();
  const saltBytes = b64ToBytes(SALT_B64);
  
  // Import code as key material for PBKDF2
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(code), "PBKDF2", false, ["deriveKey"]
  );
  
  // Derive AES key from code
  const derivedKey = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: saltBytes, iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  
  // Try each encrypted master key blob
  for (const blob of ENC_KEYS) {
    try {
      const data = b64ToBytes(blob);
      const nonce = data.slice(0, 12);
      const ciphertext = data.slice(12);
      const masterKeyBytes = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: nonce },
        derivedKey,
        ciphertext
      );
      return masterKeyBytes; // Success!
    } catch (e) {
      continue; // Wrong key for this blob, try next
    }
  }
  return null; // No match
}
